name: Publish Package to GitHub Packages

on:
  push:
    branches:
      - main
    paths:
      - 'fullerstack-substrates/**'
      - '.github/workflows/publish-package.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26-ea'
          distribution: 'temurin'
          cache: maven

      - name: Clone and install Humainary Substrates API
        run: |
          git clone https://github.com/humainary-io/substrates-api-java.git
          cd substrates-api-java/api
          mvn clean install -DskipTests

      - name: Clone and install Humainary Serventis API
        run: |
          git clone https://github.com/humainary-io/serventis-api-java.git
          cd serventis-api-java/api
          mvn clean install -DskipTests

      - name: Build and publish to GitHub Packages
        working-directory: fullerstack-substrates
        run: mvn -B clean deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
